apiVersion: batch/v1
kind: Job
metadata:
  name: main-api-load-test-aggressive
  namespace: prod-api
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: load-test-aggressive
    spec:
      restartPolicy: Never
      containers:
      - name: load-test
        image: busybox:1.36
        resources:
          requests:
            cpu: "500m"
            memory: "64Mi"
          limits:
            cpu: "1000m"
            memory: "128Mi"
        command:
          - sh
          - -c
          - |
            echo "AGGRESSIVE LOAD TEST STARTED"
            echo "Target: main-api (ClusterIP)"
            echo "Spawning parallel workers..."

            for i in 1 2 3 4 5 6 7 8; do
              (
                while true; do
                  wget -q -T 1 -O- http://main-api/ > /dev/null
                done
              ) &
            done

            wait
